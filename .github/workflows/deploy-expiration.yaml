name: deploy-expiration
on: 
  push:
    branches:
      - main
    paths:
      - 'expiration/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Updated to v4

      - name: Build Docker image
        run: cd expiration && docker build -t zeroop/expiration .

      - name: Login to Docker Hub
        uses: docker/login-action@v3 # Using official action is more secure/stable
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: docker push zeroop/expiration

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4 # Updated to v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1 

      - name: Update kubeconfig
        # FIXED: Changed cluster name to match your actual cluster
        run: aws eks update-kubeconfig --name zeroop-eks-cluster-v2 --region ap-south-1

      - name: Verify and Restart Deployment
        run: |
          kubectl rollout restart deployment expiration-depl
          kubectl rollout status deployment expiration-depl
