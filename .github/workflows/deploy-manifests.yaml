name: deploy-manifests

on: 
  push:
    branches:
      - main
    paths:
      - 'infra/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout code (Updated to v4)
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Configure AWS credentials (Updated to v4)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1  

      # Step 3: Update Kubeconfig to talk to EKS
      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --name zeroop-eks-cluster-v2 --region ap-south-1

      # Step 4: Verify Authentication (Helpful for debugging)
      - name: Verify Cluster Connection
        run: |
          kubectl get nodes || (echo "FAILED: Cannot connect to EKS. Check IAM permissions." && exit 1)

      # Step 5: Apply Manifests
      - name: Deploy Manifests
        run: |
          kubectl apply -f infra/k8s/
          kubectl apply -f infra/k8s-prod/
