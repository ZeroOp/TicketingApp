name: deploy-manifests

on: 
  push:
    branches:
      - main
    paths:
      - 'infra/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout code
      - uses: actions/checkout@v2

      # Step 2: Configure AWS credentials
      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1  

      # Step 3: Update kubeconfig and set KUBECONFIG env
      - run: |
          aws eks update-kubeconfig --name zeroop-eks-cluster-v2 --region ap-south-1
          echo "KUBECONFIG=$HOME/.kube/config" >> $GITHUB_ENV

      # Step 4: Apply manifests without validation (avoids OpenAPI errors)
      - run: |
          kubectl apply -f infra/k8s --validate=false
          kubectl apply -f infra/k8s-prod --validate=false

      # Optional: verify pods are running
      - run: kubectl get pods --all-namespaces
